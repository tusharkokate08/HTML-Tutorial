<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Elements in HTML</title>
</head>
<body>
    <h1>HTML Multimedia Elements</h1>

    <!-- Image -->
    <h2>Image</h2>
    <img src="./html.png" alt="Sample Image" width="300" height="200"><br><br>

    <!-- Audio -->
    <h2>Audio</h2>
    <audio controls>
        <source src="./audio.mp3.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio><br><br>

    <!-- Video -->
    <h2>Video</h2>
    <video width="400" controls>
        <source src="./video.mp4.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video><br><br>

    <!-- Embed -->
    <h2>Embed</h2>
    <embed src="./javanotes.pdf" type="application/pdf" width="500" height="400"><br><br>

    <!-- Iframe (YouTube video) -->
    <h2>YouTube Video (Iframe)</h2>
    <iframe width="420" height="315" 
            src="https://www.youtube.com/embed/tgbNymZ7vqY"
            frameborder="0"
            allowfullscreen>
    </iframe>

</body>
</html>
